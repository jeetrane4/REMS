<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transactions – REMS</title>

<meta name="description"
content="View and manage property transactions and payment history">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header id="header"></header>

<main class="section dashboard-page">

<div class="container">

<!-- PAGE HEADER -->

<div class="dashboard-header">

<div>

<h1>Transactions</h1>

<p class="muted-text">

Track payments and booking transactions

</p>

</div>

</div>


<!-- SUMMARY -->

<section class="section section-light">

<div class="dashboard-grid">

<div class="card summary-card">

<h3 id="totalTransactions">0</h3>

<p>Total Transactions</p>

</div>

<div class="card summary-card">

<h3 id="completedTransactions">0</h3>

<p>Completed</p>

</div>

<div class="card summary-card">

<h3 id="pendingTransactions">0</h3>

<p>Pending</p>

</div>

<div class="card summary-card">

<h3 id="cancelledTransactions">0</h3>

<p>Cancelled</p>

</div>

</div>

</section>


<!-- FILTER BAR -->

<div class="card filter-bar">

<div class="filter-group">

<label>Search</label>

<input
type="text"
id="searchTransaction"
placeholder="Search property">

</div>

<div class="filter-group">

<label>Status</label>

<select id="statusFilter" aria-label="Filter by transaction status">

<option value="">All</option>
<option value="Completed">Completed</option>
<option value="Pending">Pending</option>
<option value="Cancelled">Cancelled</option>

</select>

</div>

<div class="filter-actions">

<button
id="applyTransactionFilter"
class="btn btn--outline">

Apply

</button>

<button
id="resetTransactionFilter"
class="btn btn--outline">

Reset

</button>

</div>

</div>


<!-- TABLE -->

<section class="section">

<div class="table-responsive card">

<table class="table">

<thead>

<tr>

<th>ID</th>
<th>Property</th>
<th>User</th>
<th>Amount</th>
<th>Date</th>
<th>Status</th>

</tr>

</thead>

<tbody id="transactionTable">

<tr>

<td colspan="6" class="loading-state">

Loading transactions...

</td>

</tr>

</tbody>

</table>

</div>


<!-- EMPTY -->

<div
id="transactionEmpty"
class="empty-state hidden">

<h3>No transactions found</h3>

<p>No transaction history available.</p>

</div>


<!-- PAGINATION -->

<div
id="transactionPagination"
class="pagination">

</div>

</section>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn-circle hidden">

↑

</button>


<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>

<!-- MODULE -->

<script src="js/modules/transactions.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>
</html>
