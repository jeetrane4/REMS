<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>User Management – REMS</title>

  <meta
    name="description"
    content="Admin panel to manage platform users on REMS."
  >

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="section dashboard-page">
    <div class="container">

      <!-- PAGE HEADER -->
      <div class="dashboard-header">
        <div>
          <h1>User Management</h1>

          <p class="muted-text">
            Admin control panel for managing users
          </p>
        </div>
      </div>

      <!-- SUMMARY -->
      <section class="section section-light">
        <div class="dashboard-grid">

          <div class="card summary-card">
            <h3 id="totalUsers">0</h3>
            <p>Total Users</p>
          </div>

          <div class="card summary-card">
            <h3 id="totalBuyers">0</h3>
            <p>Buyers</p>
          </div>

          <div class="card summary-card">
            <h3 id="totalSellers">0</h3>
            <p>Sellers / Agents</p>
          </div>

          <div class="card summary-card">
            <h3 id="activeUsers">0</h3>
            <p>Active Users</p>
          </div>

        </div>
      </section>

      <!-- FILTER BAR -->
      <div class="card filter-bar">

        <div class="filter-group">
          <label for="searchUser">Search</label>

          <input
            type="text"
            id="searchUser"
            placeholder="Search users"
          >
        </div>

        <div class="filter-group">
          <label for="roleFilter">Role</label>

          <select id="roleFilter" aria-label="Filter by role type">
            <option value="">All</option>
            <option value="admin">Admin</option>
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
            <option value="agent">Agent</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="statusFilter">Status</label>

          <select id="statusFilter" aria-label="Filter by user status">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>

        <div class="filter-actions">
          <button
            id="resetUserFilter"
            type="button"
            class="btn btn--outline">
            Reset
          </button>
        </div>

      </div>

      <!-- USER TABLE -->
      <section class="section">

        <div class="table-responsive card">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="userTable" aria-live="polite">
              <tr>
                <td colspan="6" class="loading-state">
                  Loading users...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- EMPTY -->
        <div
          id="userEmpty"
          class="empty-state hidden">

          <h3>No users found</h3>
          <p>No matching users available.</p>

        </div>

        <!-- PAGINATION -->
        <div
          id="userPagination"
          class="pagination">
        </div>

      </section>

    </div>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/theme.js" defer></script>

  <!-- Module JS -->
  <script src="js/modules/users.js" defer></script>

  <!-- Page Summary Logic -->
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const resetBtn = document.getElementById("resetUserFilter");

      resetBtn?.addEventListener("click", () => {
        const search = document.getElementById("searchUser");
        const role = document.getElementById("roleFilter");
        const status = document.getElementById("statusFilter");

        if (search) search.value = "";
        if (role) role.value = "";
        if (status) status.value = "";

        window.location.reload();
      });

      const interval = setInterval(() => {
        if (Array.isArray(window.allUsers)) {
          updateUserSummary(window.allUsers);
          clearInterval(interval);
        }
      }, 300);
    });

    function updateUserSummary(users) {
      document.getElementById("totalUsers").textContent = users.length;

      document.getElementById("totalBuyers").textContent =
        users.filter((u) => u.role === "buyer").length;

      document.getElementById("totalSellers").textContent =
        users.filter((u) => u.role === "seller" || u.role === "agent").length;

      document.getElementById("activeUsers").textContent =
        users.filter((u) => u.is_active).length;
    }
  </script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
