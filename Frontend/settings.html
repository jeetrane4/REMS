<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account Settings – REMS</title>

<meta name="description"
content="Manage your REMS account settings">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/pages.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animations.css">

</head>

<body>

<header id="header"></header>

<main class="section dashboard-page">

<div class="container">

<!-- HEADER -->

<div class="dashboard-header">

<div>

<h1>Account Settings</h1>

<p class="muted-text">

Manage your profile and preferences

</p>

</div>

</div>


<!-- PROFILE -->

<section class="section section-light">

<div class="card profile-card">

<h3>Profile Information</h3>

<form id="profileForm" class="form-grid">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullName"
placeholder="full name"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="email"
required>

</div>

<div class="form-actions">

<button
type="submit"
class="btn btn--primary">

Update Profile

</button>

</div>

</form>

</div>

</section>


<!-- PASSWORD -->

<section class="section">

<div class="card">

<h3>Change Password</h3>

<form id="passwordForm" class="form-grid">

<div class="form-group">

<label>Current Password</label>

<input
type="password"
id="currentPassword"
placeholder="current password"
required>

</div>

<div class="form-group">

<label>New Password</label>

<input
type="password"
id="newPassword"
placeholder="new password"
required>

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="confirm password"
required>

</div>

<div class="form-actions">

<button
type="submit"
class="btn btn--primary">

Update Password

</button>

</div>

</form>

</div>

</section>


<!-- PREFERENCES -->

<section class="section">

<div class="card">

<h3>Preferences</h3>

<div class="preference-row">

<span>Theme</span>

<button
id="themeToggle"
class="btn btn--outline">

Toggle Theme

</button>

</div>

<div class="preference-row">

<span>Account Role</span>

<span
id="accountRole"
class="badge">

Loading...

</span>

</div>

<div class="preference-row">

<span>Account Status</span>

<span
id="accountStatus"
class="badge badge--success">

Active

</span>

</div>

</div>

</section>


<!-- DELETE ACCOUNT -->

<section class="section">

<div class="card danger-card">

<h3>Danger Zone</h3>

<p class="muted-text">

Deleting your account is permanent.

</p>

<button
id="deleteAccountBtn"
class="btn btn--danger">

Delete Account

</button>

</div>

</section>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn-circle hidden">

↑

</button>


<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>

<!-- MODULE -->

<script src="js/modules/users.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>
</html>
