<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | REMS</title>
  <meta name="description" content="The page you are looking for does not exist on the REMS platform.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <header id="header"></header>

  <main class="section">
    <div class="container center">
      <h1 class="display-title error-title">404</h1>

      <p class="muted-text">
        Oops! The page you are looking for does not exist or may have been moved.
      </p>

      <form id="searchForm" class="search-bar error-search">
        <input type="text" id="city" placeholder="Search properties by city">

        <select id="type" aria-label="Property type">
          <option value="">Property Type</option>
          <option value="house">House</option>
          <option value="apartment">Apartment</option>
          <option value="villa">Villa</option>
          <option value="commercial">Commercial</option>
        </select>

        <button class="btn btn--primary" type="submit">Search</button>
      </form>

      <div class="error-actions">
        <a href="index.html" class="btn btn--primary">Go Home</a>
        <a href="listings.html" class="btn btn--outline">Browse Properties</a>
        <a href="contact.html" class="btn btn--outline">Contact Support</a>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <button id="topBtn" class="btn btn-circle hidden" aria-label="Back to top">↑</button>

  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/modals.js" defer></script>

  <script src="js/modules/properties.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
