<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC Documents – REMS</title>

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
<header id="header"></header>

<main class="section">
  <div class="container">

    <div class="section__header">
      <h1>KYC Documents</h1>
      <p class="muted-text">
        Upload Aadhaar, PAN, Passport, or Driving License document.
      </p>
    </div>

    <form id="userDocumentForm" class="card form-grid" enctype="multipart/form-data">

      <div class="form-group">
        <label for="document_type">Document Type</label>

        <select id="document_type" name="document_type" required>
          <option value="">Select document</option>
          <option value="aadhar">Aadhaar Card</option>
          <option value="pan">PAN Card</option>
          <option value="passport">Passport</option>
          <option value="driving_license">Driving License</option>
        </select>
      </div>

      <div class="form-group">
        <label for="document">Upload Document</label>

        <input
          type="file"
          id="document"
          name="document"
          accept=".jpg,.jpeg,.png,.webp,.pdf"
          required
        >

        <p class="muted-text small">
          Allowed: JPG, PNG, WEBP, PDF. Max size: 5MB.
        </p>
      </div>

      <button class="btn btn--primary" type="submit" id="documentSubmitBtn">
        Upload Document
      </button>

    </form>

    <section class="section">
      <h2>My Documents</h2>

      <div class="table-responsive card">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Document</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody id="userDocumentTable">
            <tr>
              <td colspan="4" class="loading-state">
                Loading documents...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>
</main>

<footer id="footer"></footer>

<button id="topBtn" class="btn btn-circle hidden" aria-label="Back to top">
  ↑
</button>

<script src="js/core/storage.js" defer></script>
<script src="js/core/utils.js" defer></script>
<script src="js/core/api.js" defer></script>

<script src="js/ui/loader.js" defer></script>
<script src="js/ui/notifications.js" defer></script>
<script src="js/ui/navbar.js" defer></script>
<script src="js/ui/theme.js" defer></script>

<script defer>
document.addEventListener("DOMContentLoaded", () => {
  bindUserDocumentForm();
  loadUserDocuments();
});

function bindUserDocumentForm() {
  const form = document.getElementById("userDocumentForm");

  if (!form) return;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = document.getElementById("documentSubmitBtn");
    if (btn) btn.disabled = true;

    const formData = new FormData(form);

    try {
      window.showLoader?.();

      await window.API.upload("/user-documents", formData);

      window.notify?.("Document uploaded successfully", "success");

      form.reset();

      await loadUserDocuments();
    } catch (err) {
      console.error(err);
      window.notify?.(err.message || "Failed to upload document", "error");
    } finally {
      window.hideLoader?.();
      if (btn) btn.disabled = false;
    }
  });
}

async function loadUserDocuments() {
  const table = document.getElementById("userDocumentTable");

  try {
    const res = await window.API.get("/user-documents");
    const list = res?.data || [];

    if (!list.length) {
      table.innerHTML = `
        <tr>
          <td colspan="4">No documents uploaded.</td>
        </tr>
      `;
      return;
    }

    table.innerHTML = list.map((d) => {
      const documentLink = resolveFileUrl(d.document_url);

      return `
        <tr>
          <td>${escapeHTML(d.id)}</td>
          <td>${escapeHTML(d.document_type)}</td>
          <td>
            <a
              class="table-link"
              href="${escapeHTML(documentLink)}"
              target="_blank"
              rel="noopener">
              View Document
            </a>
          </td>
          <td>
            <span class="badge ${getStatusClass(d.status)}">
              ${escapeHTML(d.status || "pending")}
            </span>
          </td>
        </tr>
      `;
    }).join("");
  } catch (err) {
    console.error(err);

    table.innerHTML = `
      <tr>
        <td colspan="4">Failed to load documents.</td>
      </tr>
    `;
  }
}

function resolveFileUrl(url) {
  if (!url) return "#";

  if (url.startsWith("http")) return url;

  const base = (window.API_BASE || "http://localhost:5000/api").replace("/api", "");

  return `${base}${url}`;
}

function getStatusClass(status) {
  if (status === "approved") return "badge--sale";
  if (status === "rejected") return "badge--featured";
  return "badge--rent";
}

function escapeHTML(value) {
  return String(value ?? "").replace(/[&<>"']/g, (m) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  })[m]);
}
</script>

<script src="js/main.js" defer></script>
</body>
</html>
