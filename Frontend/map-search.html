<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Map Search – REMS</title>
  <meta name="description" content="Search nearby verified properties on map using REMS.">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
  <header id="header"></header>

  <main class="section">
    <div class="container">
      <div class="section__header">
        <h1>Map Search</h1>
        <p class="muted-text">Find nearby verified properties on map.</p>
      </div>

      <div id="propertyMap" class="property-map">
        <div class="empty-state">Loading map...</div>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <button id="topBtn" class="btn btn-circle hidden" aria-label="Back to top">↑</button>

  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY" defer></script>
  <script src="js/modules/map.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
