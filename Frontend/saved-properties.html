<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saved Properties – REMS</title>

<meta name="description"
content="View properties you have saved for later on REMS">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header id="header"></header>

<main class="section">

<div class="container">

<div class="section__header">

<h1>Saved Properties</h1>

<p class="muted-text">

Properties you bookmarked for later

</p>

</div>


<!-- SAVED PROPERTY GRID -->

<div
id="savedProperties"
class="property-grid">

<div class="loading-state">

Loading saved properties...

</div>

</div>


<!-- EMPTY STATE -->

<div
id="savedEmpty"
class="empty-state hidden">

<h3>No saved properties</h3>

<p>

Start browsing and save properties you like.

</p>

<a
href="listings.html"
class="btn btn--primary">

Browse Properties

</a>

</div>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn--circle hidden">

↑

</button>


<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>

<!-- MODULE -->

<script src="js/modules/properties.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>
</html>
