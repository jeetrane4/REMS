<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Saved Properties – REMS</title>

  <meta
    name="description"
    content="View properties you have saved for later on REMS."
  >

  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="section">
    <div class="container">

      <div class="section__header">
        <h1>Saved Properties</h1>

        <p class="muted-text">
          Properties you bookmarked for later
        </p>
      </div>

      <!-- SAVED PROPERTY GRID -->
      <div
        id="savedProperties"
        class="property-grid"
        aria-live="polite">

        <div class="loading-state">
          Loading saved properties...
        </div>

      </div>

      <!-- EMPTY STATE -->
      <div
        id="savedEmpty"
        class="empty-state hidden">

        <h3>No saved properties</h3>

        <p>
          Start browsing and save properties you like.
        </p>

        <a
          href="listings.html"
          class="btn btn--primary">
          Browse Properties
        </a>

      </div>

    </div>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>

  <!-- Modules -->
  <script src="js/modules/properties.js" defer></script>

  <!-- Fix Saved Properties Rendering -->
  <script defer>
    document.addEventListener("DOMContentLoaded", async () => {

      const container = document.getElementById("savedProperties");
      const empty = document.getElementById("savedEmpty");

      if (!container) return;

      try {
        const res = await window.apiRequest("/saved-properties");

        const list = res?.data || res || [];

        if (!list || list.length === 0) {
          container.innerHTML = "";
          empty?.classList.remove("hidden");
          return;
        }

        empty?.classList.add("hidden");

        container.innerHTML = list.map(p => `
          <div class="property-card">

            <div class="property-card__content">
              <h3>${p.title}</h3>

              <p class="muted-text">${p.city}</p>

              <p class="property-card__price">
                ₹${Number(p.price).toLocaleString()}
              </p>

              <a href="listing-details.html?id=${p.property_id}"
                 class="btn btn--primary btn--small">
                 View Details
              </a>

            </div>

          </div>
        `).join("");

      } catch (err) {
        console.error(err);

        container.innerHTML = `
          <div class="empty-state">
            Failed to load saved properties
          </div>
        `;
      }

    });
  </script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
