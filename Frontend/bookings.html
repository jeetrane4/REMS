<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Bookings – REMS</title>

  <meta
    name="description"
    content="Track and manage your scheduled property visits on REMS."
  >

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="section">
    <div class="container">

      <div class="section__header">
        <h1>My Property Visits</h1>

        <p class="muted-text">
          Track your scheduled property visits
        </p>
      </div>

      <!-- BOOKING LIST -->
      <div
        id="bookingList"
        class="booking-grid"
        aria-live="polite">

        <div class="loading-state">
          Loading bookings...
        </div>

      </div>

      <!-- EMPTY STATE -->
      <div
        id="bookingEmpty"
        class="empty-state hidden">

        <h3>No bookings yet</h3>

        <p>
          You haven't scheduled any property visits.
        </p>

        <a
          href="listings.html"
          class="btn btn--primary">
          Browse Properties
        </a>

      </div>

    </div>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/theme.js" defer></script>

  <!-- Module JS -->
  <script src="js/modules/booking.js" defer></script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
