<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Properties – REMS</title>

<meta name="description"
content="Browse verified properties for sale and rent with advanced filters">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header id="header"></header>

<main class="section">

<div class="container">

<!-- PAGE TITLE -->

<div class="section__header">

<h1>Browse Properties</h1>

<p class="muted-text">
Search verified properties across cities
</p>

</div>

<!-- FILTER BAR -->

<div class="filters card">

<div class="filter-group">

<label>City</label>

<input
type="text"
id="cityFilter"
placeholder="Enter city">

</div>

<div class="filter-group">

<label>Type</label>

<select id="typeFilter" aria-label="Filter by property type">

<option value="">All</option>
<option value="buy">Buy</option>
<option value="rent">Rent</option>
<option value="commercial">Commercial</option>

</select>

</div>

<div class="filter-group">

<label>Min Price</label>

<input
type="number"
id="minPrice"
placeholder="0">

</div>

<div class="filter-group">

<label>Max Price</label>

<input
type="number"
id="maxPrice"
placeholder="Any">

</div>

<div class="filter-group">

<label>Sort</label>

<select id="sortBy" aria-label="Sort properties">

<option value="">Default</option>
<option value="price_low_high">Price Low → High</option>
<option value="price_high_low">Price High → Low</option>
<option value="newest">Newest</option>

</select>

</div>

<div class="filter-actions">

<button
id="applyFilters"
class="btn btn--primary">

Apply Filters

</button>

<button
id="resetFilters"
class="btn btn--outline">

Reset

</button>

</div>

</div>

<!-- RESULTS BAR -->

<div class="results-bar">

<p id="resultsCount">
Loading...
</p>

</div>

<!-- PROPERTY GRID -->

<div
id="propertyList"
class="property-grid">

<div class="loading-state">

Loading properties...

</div>

</div>

<!-- EMPTY STATE -->

<div
id="emptyState"
class="empty-state hidden">

<h3>No properties found</h3>

<p>
Try adjusting filters
</p>

</div>

<!-- PAGINATION -->

<div
id="pagination"
class="pagination">

</div>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn-circle hidden">

↑

</button>

<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>
<script src="js/ui/modals.js"></script>

<!-- MODULES -->

<script src="js/modules/properties.js"></script>
<script src="js/modules/booking.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>

</html>
