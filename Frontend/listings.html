<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Browse Properties – REMS</title>

  <meta
    name="description"
    content="Browse verified properties for sale and rent with advanced filters."
  >

  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="section">
    <div class="container">

      <!-- PAGE TITLE -->
      <div class="section__header">
        <h1>Browse Properties</h1>

        <p class="muted-text">
          Search verified properties across cities
        </p>
      </div>

      <!-- FILTER BAR -->
      <div class="filters card">

        <div class="filter-group">
          <label for="cityFilter">City</label>
          <input
            type="text"
            id="cityFilter"
            placeholder="Enter city"
            autocomplete="address-level2"
          >
        </div>

        <div class="filter-group">
          <label for="typeFilter">Property Type</label>

          <select id="typeFilter" aria-label="Filter by property type">
            <option value="">All Types</option>
            <option value="house">House</option>
            <option value="apartment">Apartment</option>
            <option value="villa">Villa</option>
            <option value="commercial">Commercial</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="listingTypeFilter">Listing Type</label>

          <select id="listingTypeFilter" aria-label="Filter by listing type">
            <option value="">Sale / Rent</option>
            <option value="sale">Sale</option>
            <option value="rent">Rent</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="minPrice">Min Price</label>
          <input
            type="number"
            id="minPrice"
            placeholder="0"
            min="0"
          >
        </div>

        <div class="filter-group">
          <label for="maxPrice">Max Price</label>
          <input
            type="number"
            id="maxPrice"
            placeholder="Any"
            min="0"
          >
        </div>

        <div class="filter-group">
          <label for="sortBy">Sort</label>

          <select id="sortBy" aria-label="Sort properties">
            <option value="">Default</option>
            <option value="price_low_high">Price Low → High</option>
            <option value="price_high_low">Price High → Low</option>
            <option value="newest">Newest</option>
          </select>
        </div>

        <div class="filter-actions">
          <button
            id="applyFilters"
            type="button"
            class="btn btn--primary">
            Apply Filters
          </button>

          <button
            id="resetFilters"
            type="button"
            class="btn btn--outline">
            Reset
          </button>
        </div>

      </div>

      <!-- RESULTS BAR -->
      <div class="results-bar">
        <p id="resultsCount">Loading...</p>

        <a href="compare.html" class="btn btn--outline btn--small">
          Compare (<span id="compareCount">0</span>)
        </a>
      </div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state hidden">
        No properties found. Try changing your filters.
      </div>

      <!-- PROPERTY GRID -->
      <div id="propertyList" class="property-grid">
        <div class="loading-state">
          Loading properties...
        </div>
      </div>

      <!-- PAGINATION -->
      <div id="pagination" class="pagination"></div>

    </div>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/modals.js" defer></script>

  <!-- Modules -->
  <script src="js/modules/comparison.js" defer></script>
  <script src="js/modules/properties.js" defer></script>

  <!-- Page Filter Wiring -->
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);

      const cityFilter = document.getElementById("cityFilter");
      const typeFilter = document.getElementById("typeFilter");
      const listingTypeFilter = document.getElementById("listingTypeFilter");
      const minPrice = document.getElementById("minPrice");
      const maxPrice = document.getElementById("maxPrice");
      const sortBy = document.getElementById("sortBy");

      if (cityFilter) cityFilter.value = params.get("city") || "";
      if (typeFilter) typeFilter.value = params.get("type") || "";
      if (listingTypeFilter) listingTypeFilter.value = params.get("listing_type") || "";
      if (minPrice) minPrice.value = params.get("minPrice") || "";
      if (maxPrice) maxPrice.value = params.get("maxPrice") || "";
      if (sortBy) sortBy.value = params.get("sort") || "";

      document.getElementById("applyFilters")?.addEventListener("click", () => {
        const nextParams = new URLSearchParams();

        if (cityFilter?.value.trim()) nextParams.set("city", cityFilter.value.trim());
        if (typeFilter?.value) nextParams.set("type", typeFilter.value);
        if (listingTypeFilter?.value) nextParams.set("listing_type", listingTypeFilter.value);
        if (minPrice?.value) nextParams.set("minPrice", minPrice.value);
        if (maxPrice?.value) nextParams.set("maxPrice", maxPrice.value);
        if (sortBy?.value) nextParams.set("sort", sortBy.value);

        window.location.href = `listings.html?${nextParams.toString()}`;
      });

      document.getElementById("resetFilters")?.addEventListener("click", () => {
        window.location.href = "listings.html";
      });
    });
  </script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
