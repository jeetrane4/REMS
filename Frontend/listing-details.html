<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property Details – REMS</title>

<meta name="description"
content="View property price, images, amenities and location on REMS">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/pages.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

</head>

<body>

<header id="header"></header>

<main class="section">

<div class="container">

<!-- BREADCRUMB -->

<nav class="breadcrumb">

<a href="index.html">Home</a>

<span>›</span>

<a href="listings.html">Listings</a>

<span>›</span>

<span id="breadcrumbTitle">Property</span>

</nav>


<div class="property-layout">

<!-- =========================
MAIN CONTENT
========================= -->

<div class="property-main">

<!-- IMAGE SLIDER -->

<div class="swiper property-slider">

<div id="propertyGallery" class="swiper-wrapper">

<!-- Images inserted dynamically -->

<div class="swiper-slide">
<img src="images/img1.webp" alt="Property image">
</div>

</div>

<div class="swiper-pagination"></div>

</div>


<!-- PROPERTY DETAILS -->

<div id="propertyDetails" class="property-details card">

<div class="loading-state">
Loading property details...
</div>

</div>


<!-- AMENITIES -->

<section class="card section">

<h3>Amenities</h3>

<ul id="propertyAmenities" class="amenities-list">

<li class="muted-text">
Loading amenities...
</li>

</ul>

</section>


</div>


<!-- =========================
SIDEBAR
========================= -->

<aside class="property-sidebar">

<div class="card sticky-card">

<h3 id="sidebarPrice">₹ --</h3>

<p id="sidebarLocation" class="muted-text">
Location
</p>

<button id="contactBtn"
class="btn btn--primary btn--full">

Contact Agent

</button>

<button id="bookVisitBtn"
class="btn btn--outline btn--full">

Book Visit

</button>

<button id="savePropertyBtn"
class="btn btn--outline btn--full">

❤ Save Property

</button>

<p class="muted-text small">
Agent typically responds within 24 hours
</p>

</div>

</aside>

</div>


<!-- =========================
SIMILAR PROPERTIES
========================= -->

<section class="section">

<div class="section__header">
<h3>Similar Properties</h3>
</div>

<div id="similarProperties" class="property-grid">

<div class="loading-state">
Loading similar properties...
</div>

</div>

<div id="similarEmpty" class="empty-state hidden">
No similar properties found.
</div>

</section>

</div>

</main>


<footer id="footer"></footer>

<button id="topBtn" class="btn btn-circle hidden">↑</button>


<!-- =========================
CORE
========================= -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>


<!-- =========================
UI
========================= -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>
<script src="js/ui/modals.js"></script>


<!-- =========================
MODULES
========================= -->

<script src="js/modules/properties.js"></script>
<script src="js/modules/booking.js"></script>
<script src="js/modules/transactions.js"></script>
<script src="js/modules/reviews.js"></script>
<script src="js/modules/loan.js"></script>
<script src="js/modules/propertyMap.js"></script>


<!-- =========================
MAIN
========================= -->

<script src="js/main.js"></script>

</body>
</html>
