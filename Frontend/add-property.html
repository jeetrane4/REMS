<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Property – REMS</title>

<meta name="description"
content="List your property on REMS and connect with buyers and tenants">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header id="header"></header>

<main class="section">

<div class="container">

<div class="section__header">

<h1>Add New Property</h1>

<p class="muted-text">
Fill the details to list your property
</p>

</div>

<div id="formMessage" class="alert hidden"></div>

<form id="addPropertyForm" class="card property-form">

<!-- BASIC -->

<section class="form-section">

<h2>Basic Information</h2>

<div class="form-group">

<label for="title">Property Title</label>

<input
type="text"
id="title"
name="title"
placeholder="Enter property title"
required>

</div>

<div class="form-row">

<div class="form-group">

<label for="type">Property Type</label>

<select id="type" name="type" aria-label="Property type" required>

<option value="">Select</option>
<option value="house">House</option>
<option value="apartment">Apartment</option>
<option value="villa">Villa</option>
<option value="commercial">Commercial</option>

</select>

</div>

<div class="form-group">

<label for="price">Price</label>

<input
type="number"
id="price"
name="price"
placeholder="Enter price"
required>

</div>

</div>

</section>

<!-- LOCATION -->

<section class="form-section">

<h2>Location</h2>

<div class="form-group">

<label for="city">City</label>

<input
type="text"
id="city"
name="city"
placeholder="Enter city"
required>

</div>

<div class="form-group">

<label for="state">State</label>

<input
type="text"
id="state"
name="state"
placeholder="Enter state"
required>

</div>

<div class="form-group">

<label for="address">Address</label>

<textarea
id="address"
name="address"
placeholder="Full address"
rows="3"></textarea>

</div>

</section>

<!-- DESCRIPTION -->

<section class="form-section">

<h2>Description</h2>

<textarea
id="description"
name="description"
placeholder="Describe the property"
rows="4"></textarea>

</section>

<!-- MAP -->

<section class="form-section">

<h2>Select Location</h2>

<div id="propertyMap" class="property-map"></div>

<input
type="hidden"
name="latitude"
id="latitude">

<input
type="hidden"
name="longitude"
id="longitude">

</section>

<!-- AMENITIES -->

<section class="form-section">

<h2>Amenities</h2>

<div class="checkbox-grid">

<label>
<input type="checkbox" name="amenities" value="parking">
Parking
</label>

<label>
<input type="checkbox" name="amenities" value="wifi">
WiFi
</label>

<label>
<input type="checkbox" name="amenities" value="gym">
Gym
</label>

<label>
<input type="checkbox" name="amenities" value="pool">
Pool
</label>

<label>
<input type="checkbox" name="amenities" value="security">
Security
</label>

</div>

</section>

<!-- IMAGES -->

<section class="form-section">

<h2>Upload Images</h2>

<label for="images">Property Images</label>

<input
type="file"
id="images"
name="images"
multiple
accept="image/*"
aria-label="Upload property images">

<div
id="imagePreview"
class="image-preview-grid">

</div>

</section>

<!-- SUBMIT -->

<div class="form-actions">

<button
type="submit"
class="btn btn--primary btn--large">

Submit Property

</button>

</div>

</form>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn--circle hidden"
type="button">

↑

</button>

<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/notifications.js"></script>

<!-- MODULES -->

<script src="js/modules/properties.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>
</html>
