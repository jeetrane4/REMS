<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact REMS | Support</title>

  <meta
    name="description"
    content="Contact the REMS support team for assistance with properties, bookings, or transactions."
  >

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main>
    <section class="section">
      <div class="container">

        <div class="section__header">
          <h1>Contact Us</h1>

          <p class="muted-text">
            Have questions about properties, bookings, or payments?
            Our support team is here to help.
          </p>
        </div>

        <div class="contact-grid">

          <div class="card contact-info">
            <h3>Support Information</h3>

            <p><strong>Email:</strong> support@rems.com</p>
            <p><strong>Phone:</strong> +91 99999 99999</p>
            <p><strong>Location:</strong> Gujarat, India</p>

            <p class="muted-text small">
              Support Hours: Mon–Sat 9:00 AM – 6:00 PM
            </p>
          </div>

          <div class="card">
            <form id="contactForm" class="form-grid">

              <div class="form-group">
                <label for="name">Full Name</label>

                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Enter your name"
                  required
                  autocomplete="name"
                >
              </div>

              <div class="form-group">
                <label for="email">Email Address</label>

                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Enter your email"
                  required
                  autocomplete="email"
                >
              </div>

              <div class="form-group">
                <label for="message">Message</label>

                <textarea
                  id="message"
                  name="message"
                  rows="5"
                  placeholder="Write your message"
                  required
                ></textarea>
              </div>

              <div class="form-actions">
                <button
                  type="submit"
                  class="btn btn--primary"
                  id="contactSubmitBtn">
                  Send Message
                </button>
              </div>

            </form>
          </div>

        </div>

      </div>
    </section>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/modals.js" defer></script>

  <!-- Contact Form Logic -->
  <script defer>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("contactForm");

      if (!form) return;

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const btn = document.getElementById("contactSubmitBtn");
        if (btn) btn.disabled = true;

        const data = Object.fromEntries(new FormData(form));

        data.name = data.name?.trim();
        data.email = data.email?.trim();
        data.message = data.message?.trim();

        try {
          window.showLoader?.();

          await window.API.post("/contact", data);

          window.notify?.("Message sent successfully", "success");

          form.reset();
        } catch (err) {
          console.error(err);
          window.notify?.(err.message || "Failed to send message", "error");
        } finally {
          window.hideLoader?.();
          if (btn) btn.disabled = false;
        }
      });
    });
  </script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
