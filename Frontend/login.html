<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login – REMS</title>

<meta name="description"
content="Login to your REMS account">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header id="header"></header>

<main class="auth-page">

<div class="auth-card card">

<h1 class="auth-title">Welcome Back</h1>

<p class="muted-text center">

Login to manage your properties and bookings

</p>

<div
id="authMessage"
class="alert hidden"
aria-live="polite">

</div>

<form id="loginForm" novalidate>

<div class="form-group">

<label for="email">

Email Address

</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
required
autocomplete="username"
/>

</div>

<div class="form-group">

<label for="password">

Password

</label>

<div class="password-wrapper">

<input
type="password"
id="password"
name="password"
placeholder="Enter password"
required
autocomplete="current-password"
/>

<button
type="button"
class="password-toggle"
data-target="password"
aria-label="Toggle password visibility"
>

👁

</button>

</div>

</div>

<div class="form-options">

<label class="checkbox">

<input
type="checkbox"
id="rememberMe">

<span>

Remember me

</span>

</label>

<a
href="#"
class="link-small">

Forgot password?

</a>

</div>

<button
type="submit"
class="btn btn--primary btn--block"
id="loginBtn">

Login

</button>

</form>

<p class="auth-footer">

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</main>

<footer id="footer"></footer>

<button
id="topBtn"
class="btn btn--circle hidden">

↑

</button>

<!-- CORE -->

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>

<!-- UI -->

<script src="js/ui/loader.js"></script>
<script src="js/ui/notifications.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/modals.js"></script>

<!-- MODULE -->

<script src="js/modules/auth.js"></script>

<!-- MAIN -->

<script src="js/main.js"></script>

</body>
</html>
