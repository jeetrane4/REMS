<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login – REMS</title>

  <meta
    name="description"
    content="Login to your REMS account to manage properties, bookings, saved listings, and transactions."
  >

  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="auth-page">
    <div class="auth-card card">

      <h1 class="auth-title">Welcome Back</h1>

      <p class="muted-text center">
        Login to manage your properties and bookings
      </p>

      <div
        id="authMessage"
        class="alert hidden"
        aria-live="polite">
      </div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">
            Email Address
          </label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="password">
            Password
          </label>

          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              required
              autocomplete="current-password"
            >

            <button
              type="button"
              class="password-toggle"
              data-target="password"
              aria-label="Toggle password visibility">
              👁
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox">
            <input
              type="checkbox"
              id="rememberMe"
              name="rememberMe"
            >

            <span>Remember me</span>
          </label>

          <a href="#" class="link-small">
            Forgot password?
          </a>
        </div>

        <button
          type="submit"
          class="btn btn--primary btn--block"
          id="loginSubmitBtn">
          Login
        </button>

      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="register.html">Register</a>
      </p>

    </div>
  </main>

  <footer id="footer"></footer>

  <button
    id="topBtn"
    class="btn btn-circle hidden"
    aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/modals.js" defer></script>

  <!-- Module JS -->
  <script src="js/modules/auth.js" defer></script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
