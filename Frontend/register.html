<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register – REMS</title>

<meta name="description" content="Create your REMS account to buy, sell or list properties.">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/navigation.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/forms.css">

</head>

<body>

<header id="header"></header>

<main class="auth-page">

<div class="auth-card card">

<h1 class="auth-title">Create Your Account</h1>

<p class="muted-text center">
Join REMS to buy, sell or list properties
</p>

<div id="authMessage" class="alert hidden"></div>

<form id="registerForm" novalidate>

<div class="form-group">

<label for="name">Full Name</label>

<input
type="text"
id="name"
name="name"
placeholder="Enter full name"
required
/>

</div>

<div class="form-group">

<label for="email">Email Address</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter email"
required
/>

</div>

<div class="form-group">

<label for="mobile">Mobile Number</label>

<input
type="tel"
id="mobile"
name="mobile"
placeholder="Enter 10 digit mobile number"
pattern="[0-9]{10}"
required
/>

</div>

<div class="form-group">

<label for="role">Register As</label>

<select id="role" name="role" required>

<option value="">Select Role</option>
<option value="buyer">Buyer</option>
<option value="seller">Seller</option>
<option value="agent">Agent</option>

</select>

</div>

<div class="form-group">

<label for="password">Password</label>

<div class="password-wrapper">

<input
type="password"
id="password"
name="password"
placeholder="Create password"
required
/>

<button
type="button"
class="password-toggle"
data-target="password"
>
👁
</button>

</div>

<small id="passwordStrength" class="muted-text"></small>

</div>

<div class="form-group">

<label for="confirmPassword">Confirm Password</label>

<input
type="password"
id="confirmPassword"
name="confirmPassword"
placeholder="Confirm password"
required
/>

</div>

<div class="form-options">

<label class="checkbox">

<input type="checkbox" id="termsCheck" required>

<span>

I agree to the

<a href="terms.html">Terms</a> &
<a href="privacy.html">Privacy Policy</a>

</span>

</label>

</div>

<button
type="submit"
class="btn btn--primary btn--block"
>

Create Account

</button>

</form>

<p class="auth-footer">

Already have an account?

<a href="login.html">Login</a>

</p>

</div>

</main>

<footer id="footer"></footer>

<button id="topBtn" class="btn btn--circle hidden">↑</button>

<script src="js/core/storage.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/core/api.js"></script>
<script src="js/ui/loader.js"></script>
<script src="js/ui/notifications.js"></script>
<script src="js/ui/theme.js"></script>
<script src="js/ui/navbar.js"></script>
<script src="js/ui/modals.js"></script>

<script src="js/modules/auth.js"></script>

<script src="js/main.js"></script>

</body>
</html>
