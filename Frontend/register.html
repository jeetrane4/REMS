<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register – REMS</title>

  <meta
    name="description"
    content="Create your REMS account to buy, sell, or list properties."
  >

  <!-- Fonts / Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navigation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <header id="header"></header>

  <main class="auth-page">
    <div class="auth-card card">

      <h1 class="auth-title">Create Your Account</h1>

      <p class="muted-text center">
        Join REMS to buy, sell, or list properties
      </p>

      <div id="authMessage" class="alert hidden" aria-live="polite"></div>

      <form id="registerForm" novalidate>

        <div class="form-group">
          <label for="name">Full Name</label>

          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter full name"
            required
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter email"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>

          <input
            type="tel"
            id="mobile"
            name="mobile"
            placeholder="Enter 10 digit mobile number"
            pattern="[0-9]{10,15}"
            required
            autocomplete="tel"
          >
        </div>

        <div class="form-group">
          <label for="role">Register As</label>

          <select id="role" name="role" required>
            <option value="">Select Role</option>
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
            <option value="agent">Agent</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create password"
              required
              autocomplete="new-password"
            >

            <button
              type="button"
              class="password-toggle"
              data-target="password"
              aria-label="Toggle password visibility">
              👁
            </button>
          </div>

          <small id="passwordStrength" class="muted-text"></small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>

          <div class="password-wrapper">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm password"
              required
              autocomplete="new-password"
            >

            <button
              type="button"
              class="password-toggle"
              data-target="confirmPassword"
              aria-label="Toggle confirm password visibility">
              👁
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox">
            <input type="checkbox" id="termsCheck" name="termsCheck" required>

            <span>
              I agree to the
              <a href="terms.html">Terms</a> &
              <a href="privacy.html">Privacy Policy</a>
            </span>
          </label>
        </div>

        <button
          type="submit"
          class="btn btn--primary btn--block"
          id="registerSubmitBtn">
          Create Account
        </button>

      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>
  </main>

  <footer id="footer"></footer>

  <button id="topBtn" class="btn btn-circle hidden" aria-label="Back to top">
    ↑
  </button>

  <!-- Core JS -->
  <script src="js/core/storage.js" defer></script>
  <script src="js/core/utils.js" defer></script>
  <script src="js/core/api.js" defer></script>

  <!-- UI JS -->
  <script src="js/ui/loader.js" defer></script>
  <script src="js/ui/notifications.js" defer></script>
  <script src="js/ui/theme.js" defer></script>
  <script src="js/ui/navbar.js" defer></script>
  <script src="js/ui/modals.js" defer></script>

  <!-- Module JS -->
  <script src="js/modules/auth.js" defer></script>

  <!-- Main JS -->
  <script src="js/main.js" defer></script>

</body>
</html>
